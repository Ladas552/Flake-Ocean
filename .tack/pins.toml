# tack pins. edit by hand or with tack add / rm / alias
# nix reads pins.lock.json; this file drives tack update

# shorturl schemes. scheme:rest expands rest into {path}
[shorturls]
gh = "github:{path}" # github
cb = "git+https://codeberg.org/{path}" # codeberg
td = "git+https://tangled.org/{path}" # tangled
nixpkgs = "https://channels.nixos.org/{path}/nixexprs.tar.xz"

# all_follow: input name -> top-level pin it follows wherever it appears
# opt out per-input with exclude_follow
[all_follow]
# no deduplication
nixpkgs = ["nixpkgs", "nixpkgs-lib"]
systems = "systems"
hjem = "hjem"
flake-parts = "flake-parts"
home-manager = "home-manager"

flake-compat = "flake-compat"
flake-utils  = "flake-utils"
nix-darwin   = "nix-darwin"

# [inputs.<name>] fields
#   url             required, shorturl ok; ?rev=<sha> pins an exact commit
#   flake           default true; false exposes the source path
#   follows         { child = "pin" } override map
#   exclude_follow  all_follow names to skip
#   dir             subdir holding flake.nix
#   submodules      fetch git submodules

# nixpkgs links
[inputs.nixpkgs]
url = "nixpkgs:nixos-unstable"
# url = "gh:Nixos/nixpkgs/nixos-unstable"

# Home manager
[inputs.home-manager]
url = "gh:nix-community/home-manager"

# Hjem, another home-manager
[inputs.hjem]
url = "gh:feel-co/hjem"

# Modules for hjem
[inputs.hjem-rum]
url = "gh:snugnug/hjem-rum"

[inputs.flake-parts]
url = "gh:Ladas552/flake-parts"

# Neovim
[inputs.nvf]
url = "gh:notashelf/nvf"

# Niri
[inputs.niri]
url = "cb:BANanaD3V/niri-nix"

# Tanled, git hosting
[inputs.tangled]
# url = "td:tangled.org/core"
url = "git+https://knot1.tangled.sh/did:plc:j5hmlfdrwkvtxm7cjmu7j2is/"

